name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate one-click artifacts (fast profile)
        run: npm run one-click -- --root . --backend treesitter --compression ultra --hard-cap --max-tokens 2200 --task "review this patch"

      - name: Postprocess
        run: npm run postprocess -- .

      - name: Benchmark
        run: npm run benchmark -- .

      - name: Update benchmark trend
        run: npm run benchmark:trend -- .

      - name: Enforce 10x token efficiency
        run: npm run benchmark:gate -- .

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smart-context-benchmarks
          path: |
            smart-context-benchmark.json
            smart-context-benchmark-history.json
            smart-context.token-report.json
